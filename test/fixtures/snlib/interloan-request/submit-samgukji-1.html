<html lang="ko">
<head>

	$(function(){
		$("#closeBtn").click(fnClose);
		
	});

	function fnClose(){
		window.close();
	    return false;
	}
</script>
</head>
<body>
<div id="popupWrap">
	<div class="popupHeader">

	<div class="popupContainer">

	<div class="popupFooter">

		</div>
	</div>
</div>
